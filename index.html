<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain For Sale</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .domain { font-size: 2em; color: #007bff; font-weight: bold; margin: 20px 0; }
        .btn { display: inline-block; padding: 15px 25px; margin: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; color: white; }
        .whatsapp { background: #25D366; }
        .email { background: #ea4335; }
.glowing-bounce {
    display: inline-block;
    color: #007bff; /* Main text color */
    font-size: 2.5rem;
    font-weight: 800;
    text-transform: uppercase;
    text-decoration: none;
    
    /* Animation settings */
    animation: glow 1.5s ease-in-out infinite alternate, 
               bounce 2s ease-in-out infinite;
            }
            
            /* The Glowing Effect */
            @keyframes glow {
                from {
                    text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #007bff, 0 0 20px #007bff;
                }
                to {
                    text-shadow: 0 0 10px #fff, 0 0 20px #4dabf7, 0 0 30px #4dabf7, 0 0 40px #4dabf7;
                }
            }
            
            /* The Bouncing Effect */
            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }
        
    </style>
</head>
<body>
    <div class="container">

        <div class="domain">BLOCKDAG.IN</div>
        <div class="domain-name glowing-bounce">blockdag.co.in  </div>

    </div>
</body>
</html>
